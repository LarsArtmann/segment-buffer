# Lychee configuration — see https://lychee.link/org/configuration
#
# Run locally with:
#   nix run nixpkgs#lychee -- --config .github/lychee.toml '*.md' 'docs/**/*.md' 'fuzz/README.md'
#
# Exclusions:
#   - https://github.com/LarsArtmann/monitor365 — private repo of origin; the
#     link target is intentionally invisible to anonymous visitors.
#
# Expected redirects (NOT broken links; lychee reports them in the "🔀 Redirects"
# summary, not as errors). Do NOT "fix" these by replacing the source URL:
#   - https://docs.rs/segment-buffer            → /latest/segment_buffer/
#       The short stable form. The redirect is how docs.rs resolves "current
#       version" links; the resolved URL would pin us to /latest forever and
#       reads worse in markdown.
#   - https://docs.rs/segment-buffer/badge.svg  → img.shields.io/docsrs/segment-buffer/latest
#       The canonical docs.rs badge URL. Replacing it with the shields.io form
#       breaks the docs.rs badge convention every Rust crate uses.

# Reasonable timeout for slow CI runners
timeout = 20

# Retry once on transient network failures
max_retries = 1

# Accept 200 OK (default); 429 (rate-limited) excluded from failures so
# a flaky rate-limited host doesn't fail the check
accept = ["200"]

# Exclude the private monitor365 repo (referenced as text in README.md and
# CHANGELOG.md but the URL is a 404 to anonymous visitors).
# Exclude GitHub /settings/ URLs — admin-only pages that 404 for anonymous
# visitors (the lychee runner is unauthenticated). Referenced in
# docs/RELEASE.md for the CARGO_REGISTRY_TOKEN setup runbook.
# Exclude GitHub /compare/ and /releases/tag/ URLs — these are tag-dependent
# and transiently 404 when the release commit (containing the CHANGELOG link
# references) is pushed before the tag exists. CI runs on the commit before
# the tag follows. The tag's existence is verified by `git tag -l` and the
# publish workflow, not by lychee.
exclude = [
  "^https://github\\.com/LarsArtmann/monitor365",
  "^https://github\\.com/.*/settings/",
  "^https://github\\.com/.*/compare/",
  "^https://github\\.com/.*/releases/tag/",
]

# Exclude localhost / loopback
exclude_loopback = true

# Exclude private network ranges
exclude_private = true

# Check mailto: links (default behavior — opt-in instead of opt-out)
# include_mail = false
