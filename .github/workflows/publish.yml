name: Publish to crates.io

# Triggered by version tags (v0.1.0, v0.4.2, etc.). Publishes the crate to
# crates.io using the CARGO_REGISTRY_TOKEN secret.
#
# Setup (one-time, repo admin):
#   1. Create a crates.io API token at https://crates.io/settings/api-tokens
#      with `publish-new` and `publish-update` scopes.
#   2. Add it as a repository secret named `CARGO_REGISTRY_TOKEN` at
#      https://github.com/LarsArtmann/segment-buffer/settings/secrets/actions
#
# Once the secret exists, every `git push origin v*.*.*` will publish
# automatically. Until then, this workflow will fail at the publish step
# (visible in the Actions tab) and manual `cargo publish` is the fallback.

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    name: cargo publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      # Pinned to commit hash for supply-chain hygiene (vs @master which drifts).
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: Verify tag matches Cargo.toml version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          CARGO_VER=$(grep '^version =' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG" != "$CARGO_VER" ]; then
            echo "::error::tag '$TAG' does not match Cargo.toml version '$CARGO_VER'"
            exit 1
          fi
          echo "tag $TAG matches Cargo.toml version $CARGO_VER"
      - name: cargo publish
        run: cargo publish --features encryption
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
