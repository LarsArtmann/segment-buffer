name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  # Pin proptest's per-property case count so CI is deterministic and so a
  # flaky CI machine cannot silently trim coverage. 256 is the default for
  # `cargo test` on a release build but is not the default on debug builds;
  # setting it explicitly removes that variable. Bump locally via
  # `PROPTEST_CASES=4096 cargo test --features encryption` when chasing a
  # shrinking-boundary bug.
  PROPTEST_CASES: 256

jobs:
  test:
    name: Test + Clippy + Fmt
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [stable, "1.86"]
    steps:
      - uses: actions/checkout@v7
      # Pinned to commit hash for supply-chain hygiene (vs @master which drifts).
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Install zstd (macos)
        if: matrix.os == 'macos-latest'
        run: brew install zstd
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy (default)
        run: cargo clippy --all-targets -- -D warnings
      - name: Clippy (encryption)
        run: cargo clippy --all-targets --features encryption -- -D warnings
      - name: Test (default)
        run: cargo test --no-fail-fast
      - name: Test (encryption)
        run: cargo test --no-fail-fast --features encryption
      - name: Doc build
        run: cargo doc --no-deps --features encryption

  msrv:
    name: Verify MSRV (1.86)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: "1.86"
      - uses: Swatinem/rust-cache@v2
      - name: cargo check
        run: cargo check --all-targets --features encryption

  msrv-consistency:
    name: MSRV consistency guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check MSRV is consistent across all declarations
        run: bash scripts/check-msrv.sh

  html-root-url:
    name: html_root_url ↔ Cargo.toml version match
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Assert html_root_url pin matches Cargo.toml version
        # Catches the recurring rot where a release bumps Cargo.toml version
        # but forgets to bump `#![doc(html_root_url = "...")]` in src/lib.rs,
        # breaking intra-doc links on docs.rs. Local equivalent lives in
        # scripts/verify-gate.sh (the "html_root_url" step).
        run: bash scripts/check-html-root-url.sh

  supply-chain:
    name: cargo audit + cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: cargo audit (RustSec advisories)
        run: cargo audit
      - name: cargo deny (advisories + licenses + bans + sources)
        run: cargo deny check

  loom:
    name: Loom concurrency model
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      # Loom requires `--cfg loom` so parking_lot 0.12 swaps in
      # `loom::sync::Mutex`. `--release` is required: loom's exhaustive
      # exploration is too slow on debug builds. Without this job the
      # `#![cfg(loom)]` test file is invisible to CI and silently rots.
      - name: cargo test (loom)
        run: cargo test --features loom --release --test loom
        env:
          RUSTFLAGS: --cfg loom

  link-check:
    name: Markdown link check (lychee)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config .github/lychee.toml --no-progress '*.md' 'docs/**/*.md' 'fuzz/README.md'
          fail: true

  actionlint:
    name: GitHub workflow lint (actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # YAML parse is the floor. actionlint catches ${{ }} expression syntax
      # errors, `needs:` cycles, deprecated action versions, and runner/os
      # typos that YAML accepts silently. Mirrors the scripts/verify-gate.sh
      # actionlint step so drift is caught locally, not just in CI.
      - name: Run actionlint
        uses: docker://rhysd/actionlint:latest
        with:
          args: -color
